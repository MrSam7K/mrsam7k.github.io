<!DOCTYPE html>
<html>
    <head>
        <title>Countdown</title>
        <link rel="stylesheet" href="./style.css    "/>
    </head>
    <body>
        <section class="coming-soon">
            <div>
                <!--<h2>Any day now!</h2>-->
                <h2>Any day now!</h2>
                <div class="countdown">
                    <div class="container-day"><h3 class="day">0</h3><h3 class="dayText">Dienos</h3></div>
                    <div class="container-hour"><h3 class="hour">0</h3><h3 class="hourText">Valandos</h3></div>
                    <div class="container-min"><h3 class="min">0</h3><h3 class="minText">Minutės</h3></div>
                    <div class="container-sec"><h3 class="sec">0</h3><h3 class="secText">Sekundės</h3></div>
                </div>
            </div>
        </section>
        <script src="./script.js"></script>
    </body>
</html>
