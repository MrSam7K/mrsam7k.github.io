<!DOCTYPE html>
<html>
    <head>
        <title>Countdown</title>
        <link rel="stylesheet" href="./style.css    "/>
    </head>
    <body>
        <section class="coming-soon">
            <div>
                <!--<h2>Any day now!</h2>-->
                <h2>Any day now!</h2>
                <div class="countdown">
                    <div class="container-day"><h3 class="day">Time</h3><h3>Dienos</h3></div>
                    <div class="container-hour"><h3 class="hour">Time</h3><h3>Valandos</h3></div>
                    <div class="container-min"><h3 class="min">Time</h3><h3>Minutės</h3></div>
                    <div class="container-sec"><h3 class="sec">Time</h3><h3>Sekundės</h3></div>
                </div>
            </div>
        </section>
        <script src="./script.js"></script>
    </body>
</html>
